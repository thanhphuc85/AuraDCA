name: Daily DCA Bot

on:
  schedule:
    # Wake every hour. Each user's own schedule (frequency: daily / every N
    # hours / every N days / weekly, plus smart-mode conditions) decides whether
    # this particular hour is one of their execution times — the code skips
    # anyone who isn't due, so an hourly cron is cheap but supports any cadence.
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Force a dry run (no real swap)"
        type: boolean
        default: true
      withdrawal_address:
        description: "Address requesting withdrawal (0x...)"
        type: string
      withdrawal_token:
        description: "Token to withdraw"
        type: choice
        options:
          - ""
          - USDC
          - cirBTC
      withdrawal_amount:
        description: "Amount to withdraw"
        type: string

permissions:
  contents: write

concurrency:
  group: daily-dca
  cancel-in-progress: false

jobs:
  dca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24: Circle SDKs require >=22, and Node 24's CJS named-export
          # detection resolves the Circle package's ESM exports (Node 22 fails on it).
          node-version: 24
          cache: npm

      # npm install (not ci) tolerates minor lockfile/npm-version resolution
      # drift for tsx/vitest's typescript peer ranges across runner npm versions.
      - run: npm install --no-audit --no-fund

      - name: Run daily DCA
        id: run
        env:
          CIRCLE_API_KEY: ${{ secrets.CIRCLE_API_KEY }}
          CIRCLE_ENTITY_SECRET: ${{ secrets.CIRCLE_ENTITY_SECRET }}
          WALLET_ID: ${{ secrets.WALLET_ID }}
          KIT_KEY: ${{ secrets.KIT_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAX_DAILY_USDC: ${{ vars.MAX_DAILY_USDC }}
          MIN_USDC_RESERVE: ${{ vars.MIN_USDC_RESERVE }}
          MIN_SWAP_USDC: ${{ vars.MIN_SWAP_USDC }}
          CAMPAIGN_TOTAL_BUDGET_USDC: ${{ vars.CAMPAIGN_TOTAL_BUDGET_USDC }}
          CAMPAIGN_DURATION_DAYS: ${{ vars.CAMPAIGN_DURATION_DAYS }}
          TOKEN_OUT: ${{ vars.TOKEN_OUT }}
          # Scheduled runs are live by default but require the
          # LIVE_TRADING_ENABLED repo variable to be explicitly set to
          # "true" as a second safety switch. Manual runs default to a dry
          # run unless the workflow_dispatch input unchecks it.
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && (inputs.dry_run == true || vars.LIVE_TRADING_ENABLED != 'true')) || (github.event_name == 'schedule' && vars.LIVE_TRADING_ENABLED != 'true') }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # On-chain audit anchor (contracts/AuraAttestation.sol). Inert unless
          # both are set, so the cron only attests once you opt in.
          ATTESTATION_CONTRACT: ${{ vars.ATTESTATION_CONTRACT }}
          ATTESTATION_ENABLED: ${{ vars.ATTESTATION_ENABLED }}
          # Always-on Telegram alerts (src/notify.ts). Token is a secret; chat id
          # and filter are non-sensitive variables.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
          TELEGRAM_NOTIFY_ON: ${{ vars.TELEGRAM_NOTIFY_ON }}
          DCA_BASE_AMOUNT: ${{ vars.DCA_BASE_AMOUNT }}
          DCA_DIP_MILD_THRESHOLD: ${{ vars.DCA_DIP_MILD_THRESHOLD }}
          DCA_DIP_MODERATE_THRESHOLD: ${{ vars.DCA_DIP_MODERATE_THRESHOLD }}
          DCA_DIP_STRONG_THRESHOLD: ${{ vars.DCA_DIP_STRONG_THRESHOLD }}
          DCA_DIP_MILD_MULTIPLIER: ${{ vars.DCA_DIP_MILD_MULTIPLIER }}
          DCA_DIP_MODERATE_MULTIPLIER: ${{ vars.DCA_DIP_MODERATE_MULTIPLIER }}
          DCA_DIP_STRONG_MULTIPLIER: ${{ vars.DCA_DIP_STRONG_MULTIPLIER }}
          WITHDRAWAL_ADDRESS: ${{ inputs.withdrawal_address }}
          WITHDRAWAL_TOKEN: ${{ inputs.withdrawal_token }}
          WITHDRAWAL_AMOUNT: ${{ inputs.withdrawal_amount }}
        run: npx tsx src/index.ts

      - name: Commit history
        if: always()
        run: |
          git config user.name "auradca-bot"
          git config user.email "auradca-bot@users.noreply.github.com"
          git add data/history.json data/reflections.json data/ledger.json data/prices.json
          git diff --cached --quiet || git commit -m "chore: record DCA run $(date -u +%Y-%m-%d)"
          git push
