<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 740" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Aura DCA dashboard: sidebar navigation, hero, treasury stats, per-user DCA and AI chat assistant">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="0.5" stop-color="#7b6cf0"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#67e8f9"/>
    </linearGradient>
    <radialGradient id="aura1" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#8a5cf6" stop-opacity="0.20"/><stop offset="1" stop-color="#8a5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aura2" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.14"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="round"><rect x="0" y="0" width="1200" height="740" rx="18"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- backdrop -->
    <rect width="1200" height="740" fill="#0a0716"/>
    <ellipse cx="300" cy="40" rx="620" ry="360" fill="url(#aura1)"/>
    <ellipse cx="1180" cy="80" rx="520" ry="320" fill="url(#aura2)"/>

    <!-- ===== sidebar ===== -->
    <rect x="0" y="0" width="238" height="740" fill="#0d0a1c"/>
    <line x1="238" y1="0" x2="238" y2="740" stroke="#ffffff" stroke-opacity="0.08"/>
    <!-- mini orbital logo -->
    <g transform="translate(30,34)" filter="url(#glow)">
      <g fill="none" stroke="url(#brand)" stroke-width="3.4" stroke-linecap="round">
        <ellipse cx="14" cy="14" rx="14" ry="5.6" transform="rotate(35 14 14)"/>
        <ellipse cx="14" cy="14" rx="14" ry="5.6" transform="rotate(-35 14 14)"/>
      </g>
    </g>
    <text x="70" y="53" font-size="18" font-weight="800" fill="url(#word)" font-family="'Segoe UI',sans-serif">Aura DCA</text>

    <!-- nav -->
    <g font-size="13.5" fill="#c7cede">
      <rect x="16" y="96" width="206" height="38" rx="11" fill="#ffffff" fill-opacity="0.06"/>
      <rect x="16" y="96" width="3" height="38" rx="2" fill="url(#brand)"/>
      <text x="40" y="120" fill="#ffffff" font-weight="700">🏠  Dashboard</text>
      <text x="40" y="164" fill="#9aa4bd">📅  My DCA Schedule</text>
      <text x="40" y="204" fill="#9aa4bd">📜  Live Runs / History</text>
      <text x="40" y="244" fill="#9aa4bd">📉  Dip Signals</text>
      <text x="40" y="284" fill="#9aa4bd">🏦  Treasury</text>
      <text x="40" y="324" fill="#9aa4bd">📊  Analytics</text>
      <text x="40" y="364" fill="#9aa4bd">⚙️  Settings</text>
    </g>
    <line x1="24" y1="392" x2="214" y2="392" stroke="#ffffff" stroke-opacity="0.07"/>
    <g font-size="12.5" fill="#6f7891">
      <text x="40" y="422">🔗  GitHub Source</text>
      <text x="40" y="452">🧭  Arc Explorer ↗</text>
    </g>
    <text x="24" y="712" font-size="11" fill="#5b6480">Autonomous DCA · Arc Testnet</text>

    <!-- ===== top bar ===== -->
    <g transform="translate(238,0)">
      <rect x="24" y="24" width="118" height="30" rx="15" fill="#132a1f" stroke="#34d399" stroke-opacity="0.4"/>
      <circle cx="42" cy="39" r="4" fill="#34d399"/>
      <text x="54" y="43" font-size="12.5" fill="#8ff0c2">Arc Testnet</text>
      <rect x="152" y="24" width="112" height="30" rx="15" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="168" y="43" font-size="12.5" fill="#c7cede">⛽ 25.0 Gwei</text>
      <!-- toggles -->
      <rect x="742" y="24" width="52" height="30" rx="10" fill="#ffffff" fill-opacity="0.05"/>
      <text x="752" y="43" font-size="12" fill="#c7cede">🇬🇧 EN</text>
      <rect x="802" y="24" width="40" height="30" rx="10" fill="#ffffff" fill-opacity="0.05"/>
      <text x="812" y="44" font-size="15">🌙</text>
      <rect x="852" y="22" width="150" height="34" rx="11" fill="url(#brand)"/>
      <text x="878" y="44" font-size="13.5" font-weight="700" fill="#0a0716">Connect Wallet</text>
    </g>

    <!-- ===== hero ===== -->
    <g transform="translate(238,0)">
      <rect x="330" y="96" width="330" height="30" rx="15" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.08"/>
      <circle cx="352" cy="111" r="4" fill="#34d399"/>
      <text x="366" y="115" font-size="12.5" fill="#a9b2c9">Encode × Circle · Programmable Money Hackathon</text>

      <text x="496" y="188" text-anchor="middle" font-size="46" font-weight="800" fill="#eaf0fb" font-family="'Segoe UI',sans-serif">An agent that</text>
      <text x="496" y="242" text-anchor="middle" font-size="46" font-weight="800" fill="url(#word)" font-family="'Segoe UI',sans-serif">dollar-cost-averages</text>
      <text x="496" y="296" text-anchor="middle" font-size="46" font-weight="800" fill="#eaf0fb" font-family="'Segoe UI',sans-serif">for you.</text>
      <text x="496" y="336" text-anchor="middle" font-size="14.5" fill="#97a4bf">Every day it asks Claude how much USDC to allocate, enforces guardrails</text>
      <text x="496" y="358" text-anchor="middle" font-size="14.5" fill="#97a4bf">in code, and executes a real USDC → cirBTC swap on Arc Testnet.</text>

      <rect x="356" y="384" width="150" height="42" rx="12" fill="url(#brand)"/>
      <text x="431" y="411" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0a0716">Connect Wallet</text>
      <rect x="518" y="384" width="130" height="42" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
      <text x="583" y="411" text-anchor="middle" font-size="13.5" fill="#c7cede">View source ↗</text>
    </g>

    <!-- ===== stat tiles ===== -->
    <g transform="translate(262,470)">
      <g>
        <rect x="0" y="0" width="216" height="120" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
        <text x="20" y="34" font-size="20">💸</text>
        <text x="20" y="78" font-size="30" font-weight="800" fill="#eaf0fb">13.0</text>
        <text x="20" y="102" font-size="12" fill="#97a4bf">Total USDC Deployed</text>
      </g>
      <g transform="translate(232,0)">
        <rect x="0" y="0" width="216" height="120" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
        <text x="20" y="34" font-size="20">📈</text>
        <text x="20" y="78" font-size="30" font-weight="800" fill="#eaf0fb">0.00</text>
        <text x="20" y="102" font-size="12" fill="#97a4bf">Today's DCA</text>
      </g>
      <g transform="translate(464,0)">
        <rect x="0" y="0" width="216" height="120" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
        <text x="20" y="34" font-size="20">👥</text>
        <text x="20" y="78" font-size="30" font-weight="800" fill="url(#word)">2</text>
        <text x="20" y="102" font-size="12" fill="#97a4bf">Active Users</text>
      </g>
      <g transform="translate(696,0)">
        <rect x="0" y="0" width="216" height="120" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
        <text x="20" y="34" font-size="20">✅</text>
        <text x="20" y="78" font-size="30" font-weight="800" fill="#34d399">Live</text>
        <text x="20" y="102" font-size="12" fill="#97a4bf">Autonomous · 3×/day</text>
      </g>
    </g>

    <!-- ===== chat assistant bubble ===== -->
    <g transform="translate(1096,636)" filter="url(#glow)">
      <circle cx="26" cy="26" r="28" fill="url(#brand)"/>
      <text x="26" y="34" text-anchor="middle" font-size="24">💬</text>
    </g>
    <g transform="translate(812,470)">
      <rect x="0" y="0" width="330" height="150" rx="16" fill="#0e0b1e" stroke="#ffffff" stroke-opacity="0.1"/>
      <circle cx="26" cy="28" r="13" fill="url(#brand)"/><text x="26" y="33" text-anchor="middle" font-size="12">🤖</text>
      <text x="48" y="26" font-size="13" font-weight="700" fill="#eaf0fb">Aura Assistant</text>
      <text x="48" y="42" font-size="10.5" fill="#8b93ab">Ask about your DCA, treasury &amp; trades</text>
      <rect x="16" y="58" width="210" height="30" rx="10" fill="#ffffff" fill-opacity="0.05"/>
      <text x="28" y="77" font-size="11.5" fill="#c7cede">How much is in the treasury?</text>
      <rect x="60" y="94" width="254" height="42" rx="12" fill="url(#brand)" opacity="0.14"/>
      <rect x="60" y="94" width="254" height="42" rx="12" fill="none" stroke="url(#brand)" stroke-opacity="0.4"/>
      <text x="74" y="112" font-size="11.5" fill="#d7d2f7">13 USDC pooled across 2 users, 0 cirBTC</text>
      <text x="74" y="127" font-size="11.5" fill="#d7d2f7">accumulated yet — swaps paused (route outage).</text>
    </g>
  </g>
  <rect x="0.5" y="0.5" width="1199" height="739" rx="18" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
</svg>
