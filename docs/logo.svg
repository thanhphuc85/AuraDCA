<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Aura DCA Agent logo">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00c6ff"/>
      <stop offset="0.5" stop-color="#8a5cf6"/>
      <stop offset="1" stop-color="#f857a6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#8a5cf6" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#8a5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded app-icon tile -->
  <rect x="4" y="4" width="112" height="112" rx="28" fill="#0d1424"/>
  <rect x="4" y="4" width="112" height="112" rx="28" fill="none" stroke="url(#g)" stroke-width="2" opacity="0.7"/>

  <!-- aurora glow background -->
  <circle cx="60" cy="55" r="36" fill="url(#glow)"/>

  <!-- the Aura: layered aurora arcs -->
  <path d="M24 88 A44 44 0 0 1 96 52" fill="none" stroke="#00c6ff" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <path d="M28 84 A38 38 0 0 1 92 54" fill="none" stroke="url(#g)" stroke-width="6" stroke-linecap="round"/>
  <path d="M34 78 A30 30 0 0 1 86 58" fill="none" stroke="#f857a6" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

  <!-- DCA accumulation: ascending coin dots -->
  <circle cx="34" cy="84" r="5" fill="#00c6ff"/>
  <circle cx="50" cy="76" r="6" fill="#6f6ee6"/>
  <circle cx="66" cy="66" r="7" fill="#8a5cf6"/>
  <circle cx="84" cy="54" r="8.5" fill="#f857a6"/>

  <!-- agent spark at the leading edge -->
  <path d="M84 54 l3 -8 l3 8 l8 3 l-8 3 l-3 8 l-3 -8 l-8 -3 z" fill="#ffd700"/>
</svg>
