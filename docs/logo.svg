<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Aura DCA logo">
  <defs>
    <linearGradient id="og" x1="16" y1="26" x2="104" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="0.45" stop-color="#7b6cf0"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="og-glow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- two crossing orbital rings: purple (top-left) blending into cyan (bottom-right) -->
  <g fill="none" stroke="url(#og)" stroke-width="9" stroke-linecap="round" filter="url(#og-glow)">
    <ellipse cx="60" cy="60" rx="45" ry="18.5" transform="rotate(35 60 60)"/>
    <ellipse cx="60" cy="60" rx="45" ry="18.5" transform="rotate(-35 60 60)"/>
  </g>
</svg>
